http:
  middlewares:
    # Rate Limit Middleware (100 req/min)
    rate-limit-api:
      rateLimit:
        average: 100
        period: 1m
        burst: 50
        sourceCriterion:
          ipStrategy:
            depth: 0

    # Auth Stub (For future use)
    # api-key-auth:
    #   forwardAuth:
    #     address: "http://backend:8000/auth/validate"

  routers:
    # API Router (Manual definition because backend uses network_mode: host)
    api:
      rule: "PathPrefix(`/api/v1`) || Path(`/health`)"
      service: api-service
      middlewares:
        - rate-limit-api

  services:
    api-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8000"
