version: "3.8"

networks:
  sathya-network:
    driver: bridge

services:
  # ═══════════════════════════════════════════════════════════════
  # TRAEFIK (Reverse Proxy & Edge Layer)
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8090:80"      # API Gateway
      - "8080:8080"    # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - sathya-network

  # ═══════════════════════════════════════════════════════════════
  # BACKEND (FastAPI - Python)
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sathya-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./contracts:/contracts
    labels:
      - "traefik.enable=true"
      # API routes (/api/*)
      - "traefik.http.routers.backend-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-api.entrypoints=web"
      - "traefik.http.services.backend-api.loadbalancer.server.port=8000"
      # Health route
      - "traefik.http.routers.backend-health.rule=Path(`/health`)"
      - "traefik.http.routers.backend-health.entrypoints=web"
      - "traefik.http.routers.backend-health.service=backend-api"
      # Rate limiting
      - "traefik.http.routers.backend-api.middlewares=rate-limit-api@file"
    networks:
      - sathya-network
    depends_on:
      - traefik

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND (NextJS/Vite UI)
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
    container_name: sathya-frontend
    restart: unless-stopped
    tty: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
    networks:
      - sathya-network
    depends_on:
      - traefik
