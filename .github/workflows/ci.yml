name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    # Dummy values so Pydantic Settings and third-party clients
    # (Cohere, Supabase, Neo4j, etc.) can be imported without crashing.
    # No real connections are made during unit tests.
    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_KEY: "placeholder"
      NEO4J_URI: "bolt://localhost:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "placeholder"
      SECRET_KEY: "ci-test-secret-key-32-chars-xxxxxx"
      CO_API_KEY: "placeholder"
      COHERE_API_KEY: "placeholder"
      PORTKEY_API_KEY: "placeholder"
      GOOGLE_API_KEY: "placeholder"
      TAVILY_API_KEY: "placeholder"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Using setup-python's built-in cache is simpler and more reliable
      # than managing actions/cache manually for pip.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black isort

      - name: Check formatting (Black)
        run: |
          cd backend
          black --check --diff .

      - name: Check import order (isort)
        run: |
          cd backend
          isort --check-only --diff .

      - name: Lint (flake8)
        run: |
          cd backend
          # Hard-fail only on syntax errors and undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Style warnings reported but never block the build
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          cd backend
          # tests/scripts and tests/debug are integration tests that require
          # real API keys — excluded here, run separately in a staging environment.
          pytest tests/ \
            --ignore=tests/scripts \
            --ignore=tests/debug \
            -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        timeout-minutes: 10
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd frontend
          npm run build

      # Uncomment once jest/vitest is configured:
      # - name: Run tests
      #   run: |
      #     cd frontend
      #     npm test -- --passWithNoTests

  security-scan:
    name: Security Scan (filesystem)
    runs-on: ubuntu-latest
    # Only needs read on contents; write on security-events to upload SARIF
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      # Uploads results to GitHub Security tab (visible in repo → Security → Code scanning)
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./backend/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./frontend/Dockerfile