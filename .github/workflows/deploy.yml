name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: asia-south1-docker.pkg.dev
  PROJECT_ID: dotted-carrier-483916-b5
  REPOSITORY: sathyanishta-prod
  VM_NAME: sathyanishta-1
  GCP_ZONE: asia-south1-a
  STATIC_IP: 34.100.219.13

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Write the deployment script locally, then scp it to the VM.
      # This is safer than inlining commands in --command "..." because
      # it avoids shell-escaping issues when mixing runner env vars
      # (expanded here) with remote env vars (expanded on the VM).
      - name: Write deployment script
        run: |
          # Capture runner-side vars into the script at write time
          BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          SHORT_TAG="${IMAGE_TAG:0:7}"

          cat > deploy.sh << EOF
          #!/bin/bash
          set -euo pipefail

          BACKEND_IMAGE="${BACKEND_IMAGE}"
          FRONTEND_IMAGE="${FRONTEND_IMAGE}"
          IMAGE_TAG="${IMAGE_TAG}"
          SHORT_TAG="${SHORT_TAG}"
          APP_DIR="/opt/sathyanishta"

          echo "==> Deploying commit \${SHORT_TAG}"

          cd "\${APP_DIR}"

          # ── Backup current images with a timestamped tag ──────────────────
          BACKUP_TAG="backup-\$(date +%Y%m%d-%H%M%S)"
          echo "==> Tagging current images as \${BACKUP_TAG}..."
          docker tag "\${BACKEND_IMAGE}:latest"  "\${BACKEND_IMAGE}:\${BACKUP_TAG}"  2>/dev/null || true
          docker tag "\${FRONTEND_IMAGE}:latest" "\${FRONTEND_IMAGE}:\${BACKUP_TAG}" 2>/dev/null || true

          # ── Pull new images ───────────────────────────────────────────────
          echo "==> Pulling new images (tag: \${SHORT_TAG})..."
          docker pull "\${BACKEND_IMAGE}:\${IMAGE_TAG}"
          docker pull "\${FRONTEND_IMAGE}:\${IMAGE_TAG}"

          # Promote to :latest so docker-compose picks them up
          docker tag "\${BACKEND_IMAGE}:\${IMAGE_TAG}"  "\${BACKEND_IMAGE}:latest"
          docker tag "\${FRONTEND_IMAGE}:\${IMAGE_TAG}" "\${FRONTEND_IMAGE}:latest"

          # ── Restart services ──────────────────────────────────────────────
          echo "==> Restarting services..."
          docker-compose down --remove-orphans || true
          cp config/.env.prod .env
          docker-compose up -d

          # ── Health checks (retry loop) ────────────────────────────────────
          echo "==> Waiting for services to become healthy..."

          check_health() {
            local name="\$1"
            local url="\$2"
            local attempts=12
            local wait=10

            for i in \$(seq 1 \${attempts}); do
              if curl -sf "\${url}" > /dev/null 2>&1; then
                echo "  ✓ \${name} is healthy"
                return 0
              fi
              echo "  [\${i}/\${attempts}] \${name} not ready — retrying in \${wait}s..."
              sleep "\${wait}"
            done

            echo "  ✗ \${name} health check failed — rolling back"
            docker-compose down || true
            docker tag "\${BACKEND_IMAGE}:\${BACKUP_TAG}"  "\${BACKEND_IMAGE}:latest"  || true
            docker tag "\${FRONTEND_IMAGE}:\${BACKUP_TAG}" "\${FRONTEND_IMAGE}:latest" || true
            docker-compose up -d || true
            exit 1
          }

          check_health "Backend"  "http://localhost:8000/health"
          check_health "Frontend" "http://localhost:3000"

          # ── Cleanup ───────────────────────────────────────────────────────
          echo "==> Pruning unused images..."
          docker image prune -f

          echo "==> Deployment of \${SHORT_TAG} complete"
          docker-compose ps
          EOF

          chmod +x deploy.sh

      - name: Copy deployment script to VM
        run: |
          gcloud compute scp deploy.sh ${{ env.VM_NAME }}:/tmp/deploy.sh \
            --zone=${{ env.GCP_ZONE }}

      - name: Execute deployment on VM
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="bash /tmp/deploy.sh"

      # ── External smoke tests (run from the runner, not the VM) ────────────
      - name: Smoke tests
        run: |
          smoke_test() {
            local name="$1"
            local url="$2"
            local attempts=5
            local wait=15

            for i in $(seq 1 ${attempts}); do
              if curl -sf "${url}" > /dev/null 2>&1; then
                echo "✓ ${name} smoke test passed"
                return 0
              fi
              echo "[${i}/${attempts}] ${name} not reachable — retrying in ${wait}s..."
              sleep "${wait}"
            done

            echo "✗ ${name} smoke test failed"
            exit 1
          }

          smoke_test "Backend API"  "http://${{ env.STATIC_IP }}:8000/health"
          smoke_test "Frontend"     "http://${{ env.STATIC_IP }}:8090"

          echo "All smoke tests passed."

      - name: Report success
        if: success()
        run: |
          echo "✅ Production deployment succeeded"
          echo "   Commit : ${{ github.event.workflow_run.head_sha }}"
          echo "   API    : http://${{ env.STATIC_IP }}:8000"
          echo "   App    : http://${{ env.STATIC_IP }}:8090"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Deployment failed — check logs above for details."
          echo "   Manual intervention may be required."
          # Uncomment to add Slack or email alerting:
          # uses: slackapi/slack-github-action@v1