[tool.black]
line-length = 127
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | test-env
  | env
  | __pycache__
  | \.pytest_cache
  | \.mypy_cache
  | \.eggs
  | \.tox
  | build
  | dist
  | tests/scripts
  | tests/debug
)/
'''

[tool.isort]
profile = "black"
line_length = 127
skip_glob = [
    "*/test-env/*",
    "*/.venv/*",
    "*/venv/*",
    "*/env/*",
    "*/__pycache__/*",
    "*/build/*",
    "*/dist/*",
    "*/tests/scripts/*",
    "*/tests/debug/*",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.flake8]
max-line-length = 127
max-complexity = 10
exclude = [
    ".git",
    "__pycache__",
    "test-env",
    "venv",
    ".venv",
    "env",
    "build",
    "dist",
    "tests/scripts",
    "tests/debug",
]
# Only hard-fail on fatal errors (matches CI behaviour)
select = ["E9", "F63", "F7", "F82"]