[tool.black]
line-length = 127
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | test-env
  | __pycache__
  | \.pytest_cache
  | \.mypy_cache
  | \.eggs
  | \.tox
  | build
  | dist
  | node_modules
)/
'''

[tool.isort]
profile = "black"
line_length = 127
skip_glob = [
    "*/.venv/*",
    "*/venv/*",
    "*/test-env/*",
    "*/__pycache__/*",
    "*/build/*",
    "*/dist/*",
]
